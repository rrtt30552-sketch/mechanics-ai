version: "3.9"

services:
  # ========== Databases ==========
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mech-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mech_ai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mech-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: mech-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ========== Backend Services ==========
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-user-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    working_dir: /app/user-service
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  knowledge-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-knowledge-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    working_dir: /app/knowledge-service
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
      MINIO_ENDPOINT: "minio:9000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  agent-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-agent-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    working_dir: /app/agent-service
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
    depends_on:
      postgres:
        condition: service_healthy

  learning-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-learning-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload
    working_dir: /app/learning-service
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
    depends_on:
      postgres:
        condition: service_healthy

  engineering-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-engineering-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload
    working_dir: /app/engineering-service
    ports:
      - "8006:8006"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
    depends_on:
      postgres:
        condition: service_healthy

  diagnosis-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: mech-diagnosis-svc
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload
    working_dir: /app/diagnosis-service
    ports:
      - "8007:8007"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/mech_ai"
    depends_on:
      postgres:
        condition: service_healthy

  # ========== Frontend ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mech-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost"

  # ========== Nginx ==========
  nginx:
    image: nginx:alpine
    container_name: mech-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - knowledge-service
      - agent-service
      - learning-service
      - engineering-service
      - diagnosis-service
      - frontend

volumes:
  pg_data:
  redis_data:
  minio_data:
